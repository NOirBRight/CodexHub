name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python tests
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run pytest
        run: python -m pytest -q

  frontend:
    name: Frontend build and UI contract
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run UI contract tests
        run: npm run test:ui-contract

  rust-tests:
    name: Rust tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Prepare Tauri resource placeholder
        run: |
          New-Item -ItemType Directory -Force resources/python | Out-Null
          Set-Content -Path resources/python/.ci-placeholder -Value ''

      - name: Run cargo tests
        run: cargo test --locked

  rust-clippy:
    name: Rust clippy
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust stable with clippy
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add clippy

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-clippy-

      - name: Prepare Tauri resource placeholder
        run: |
          New-Item -ItemType Directory -Force resources/python | Out-Null
          Set-Content -Path resources/python/.ci-placeholder -Value ''

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings
